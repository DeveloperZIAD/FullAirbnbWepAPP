name: AirbnbClone Continuous Delivery

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # بناء ورفع الـ Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./BackAPP/Dockerfile
          push: true
          tags: ghcr.io/developerziad/airbnb-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # بناء ورفع الفرونت آند
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./FrontAPP/airbnb-frontend
          file: ./FrontAPP/airbnb-frontend/Dockerfile
          push: true
          tags: ghcr.io/developerziad/airbnb-frontend:latest
          build-args: |
            REACT_APP_API_URL=https://[YOUR_RAILWAY_DOMAIN]/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
